<!doctype html>
<html lang="bs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PremiumTV Europe</title>

<meta name="description" content="PremiumTV Europe – stabilan TV servis sa 20.000+ korisnika i 12 godina iskustva. HD/4K kanali, filmovi i serije, podrška 24/7.">
<meta name="keywords" content="IPTV, PremiumTV, TV, IPTV Balkan, najbolji IPTV, IPTV pretplata">
<meta name="author" content="PremiumTV">

<meta property="og:title" content="PremiumTV Europe">
<meta property="og:description" content="Pouzdan TV servis – HD/4K kvalitet, stabilan signal i podrška 24/7.">
<meta property="og:type" content="website">
<meta property="og:image" content="premiumtv.jpg.PNG">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root{
  --neon:#2ac0ff;
  --accent:#4a6bff;
  --muted:rgba(200,220,255,.25);
  --glass:rgba(255,255,255,.05);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,system-ui;
  background:linear-gradient(180deg,#050714,#02102a);
  color:#e6f7ff;
}

a{text-decoration:none;color:inherit}

.wrap{
  max-width:1200px;
  margin:auto;
  padding:0 18px;
}

/* HEADER */
.header{
  position: relative;
  padding: 40px 12px;
  display:flex;
  justify-content:center;
  align-items:center;
}

.logo-wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.site-logo{
  max-width:180px;
  margin-bottom:14px;
  filter: drop-shadow(0 0 12px rgba(255,200,80,0.25));
}

.tagline{
  font-size:14px;
  color:var(--muted);
  font-weight:600;
}

.menu-toggle{
  position:absolute;
  top:18px;
  right:18px;
  background:none;
  border:none;
  color:var(--neon);
  font-size:32px;
}

/* NAV */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,6,20,.96);
  backdrop-filter:blur(8px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transform:scale(0);
  transition:.4s;
  z-index:999;
}
.overlay.open{transform:scale(1)}
.overlay a{font-size:22px;padding:12px}
.closebtn{
  position:absolute;
  top:18px;
  right:22px;
  font-size:36px;
  color:var(--neon);
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 12px;
}
.hero h1{
  font-family:'Bebas Neue';
  font-size:56px;
  margin:0;
}
.hero p{
  max-width:720px;
  margin:14px auto;
  color:var(--muted);
}
.cta{
  display:inline-block;
  margin:10px;
  padding:14px 28px;
  border-radius:14px;
  background:linear-gradient(135deg,var(--neon),var(--accent));
  color:#001;
  font-weight:800;
}

/* BADGES */
.trust-badges{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px;
  margin:20px 0;
}
.badge{
  background:var(--glass);
  padding:12px 18px;
  border-radius:14px;
}

/* COUNTERS */
.counters{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:14px;
}
.counter-box{
  min-width:160px;
  background:var(--glass);
  padding:18px;
  border-radius:14px;
  text-align:center;
}
.counter{
  font-size:26px;
  font-weight:800;
  color:var(--neon);
}

/* PANELS */
.panel{
  background:var(--glass);
  border-radius:16px;
  padding:26px;
  margin:30px 0;
}
.trust-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:16px;
}
.trust-item{
  background:rgba(255,255,255,.04);
  padding:20px;
  border-radius:14px;
  text-align:center;
}

/* FOOTER */
footer{
  margin-top:40px;
  padding:30px;
  text-align:center;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  right:18px;
  bottom:18px;
  padding:14px 18px;
  border-radius:14px;
  background:linear-gradient(135deg,#25d366,#128c7e);
  color:#fff;
}
</style>
</head>

<body>

<div class="wrap">

<header class="header">
  <button class="menu-toggle" onclick="openNav()">☰</button>

  <div class="logo-wrapper">
    <img src="premiumtv.jpg.PNG" class="site-logo">
    <div class="tagline">BROJ 1 • Kvalitet i stabilnost na PRVOM mjestu!</div>
  </div>
</header>

<nav id="nav" class="overlay">
  <div class="closebtn" onclick="closeNav()">×</div>
  <a href="#">Početna</a>
  <a href="#">O nama</a>
  <a href="#">Cjenovnik</a>
  <a href="#">Kontakt</a>
</nav>

<section class="hero">
  <h1>PremiumTV Europe</h1>
  <p>12 godina iskustva · 20.000+ korisnika · Stabilan HD/4K IPTV</p>
  <a href="#" class="cta">🎯 Besplatna proba</a>
  <a href="#" class="cta">💳 Pogledaj pakete</a>
</section>

<div class="trust-badges">
  <div class="badge">🔒 Sigurno</div>
  <div class="badge">⭐ Trusted</div>
  <div class="badge">📡 99.9%</div>
  <div class="badge">🕒 24/7</div>
</div>

<div class="counters">
  <div class="counter-box"><div class="counter" data-target="20000">0</div>Korisnika</div>
  <div class="counter-box"><div class="counter" data-target="12">0</div>Godina</div>
  <div class="counter-box"><div class="counter" data-target="24">0</div>Podrška</div>
</div>

<footer>
  <strong>PremiumTV Europe</strong><br>
  ©2026
</footer>

</div>

<a href="#" class="whatsapp">💬 WhatsApp</a>

<script>
function openNav(){document.getElementById("nav").classList.add("open")}
function closeNav(){document.getElementById("nav").classList.remove("open")}

document.querySelectorAll(".counter").forEach(c=>{
  let t=+c.dataset.target,n=0,s=t/60;
  let i=setInterval(()=>{
    n+=s;
    if(n>=t){c.textContent=t+"+";clearInterval(i)}
    else c.textContent=Math.floor(n)
  },20)
});
</script>

</body>
</html>
